# After Build (Sonar) completes, fetch issues from SonarCloud and open/update a PR
# with the issue list in the description. No file changes.
#
# PR creation requires one of:
# - Repo setting: Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests"
# - Or add a Personal Access Token (repo + pull_requests) as secret PR_BOT_TOKEN

name: Sonar issues report PR

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  report:
    name: Open PR with issues list
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch SonarCloud issues
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT: mohdashraf010897_auto-sonar-poc
        run: |
          curl -sS -H "Authorization: Bearer $SONAR_TOKEN" \
            "https://sonarcloud.io/api/issues/search?projects=${SONAR_PROJECT}&branch=main&resolved=false&ps=500" \
            -o /tmp/issues.json

      - name: Build PR body
        run: |
          TOTAL=$(jq -r '.total // 0' /tmp/issues.json)
          echo "## SonarCloud issues (branch: main)" >> $GITHUB_STEP_SUMMARY
          echo "**Total: $TOTAL**" >> $GITHUB_STEP_SUMMARY

          {
            echo "# SonarCloud issues report"
            echo ""
            echo "**Branch:** main"
            echo "**Total issues:** $TOTAL"
            echo ""
            if [ "$TOTAL" = "0" ]; then
              echo "No open issues."
            else
              echo "| Severity | Rule | Message | File | Line |"
              echo "|----------|------|---------|------|------|"
              jq -r '.issues[]? | [.severity, .rule, (.message | .[0:80]), (.component | split(":")[1:] | join(":")), (.line // "-" | tostring)] | @tsv' /tmp/issues.json 2>/dev/null | while IFS=$'\t' read -r sev rule msg comp lineNum; do
                msg_esc=$(echo "$msg" | sed 's/|/\\|/g')
                echo "| $sev | \`$rule\` | $msg_esc | \`$comp\` | $lineNum |"
              done
            fi
            echo ""
            echo "---"
            echo "*Report generated by Sonar issues report PR workflow*"
          } > /tmp/pr-body.md

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies (for codemods)
        run: pnpm install --frozen-lockfile

      - name: Run Sonar codemods
        run: node scripts/sonar-fixer/run.cjs /tmp/issues.json

      - name: Push report branch and create/update PR
        env:
          GH_TOKEN: ${{ secrets.PR_BOT_TOKEN || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="bot/sonar-issues-report"
          git checkout -B "$BRANCH"
          if git diff --quiet && git diff --cached --quiet; then
            git commit --allow-empty -m "Sonar issues report [bot]"
          else
            git add -A
            git commit -m "Fix Sonar issues (codemods: S1481, S2228/S106)"
          fi
          git push origin "$BRANCH" --force

          PR_NUM=$(gh pr list --head "$BRANCH" --base main --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$PR_NUM" ]; then
            gh pr edit "$PR_NUM" --body-file /tmp/pr-body.md
            echo "Updated PR #$PR_NUM"
          else
            gh pr create --base main --head "$BRANCH" --title "SonarCloud issues report" --body-file /tmp/pr-body.md
            echo "Created new PR"
          fi
